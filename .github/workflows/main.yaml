name: 部署网站工作流（gh-pages）

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出主分支
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 构建 VuePress 站点
      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm ci

      - name: 构建 VuePress 站点
        run: npm run build

      - name: 验证 DEPLOY_KEY 是否存在
        run: |
          if [ -z "${{ secrets.DEPLOY_KEY }}" ]; then
            echo "错误：DEPLOY_KEY 密钥未设置。请在仓库设置中配置 DEPLOY_KEY 密钥。"
            exit 1
          fi
          echo "DEPLOY_KEY 已配置"

      - name: 设置 SSH 用于 git 访问
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: 推送到目标仓库（仅 dist 目录）
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          mkdir temp_target
          cd temp_target
          
          # 克隆目标仓库的 gh-pages 分支
          git clone git@github.com:Luo202044/ClassIn.git --branch gh-pages .
          
          # 备份可能存在的 .nojekyll 和 CNAME 文件
          cp .nojekyll ../.nojekyll.backup 2>/dev/null || echo "未找到 .nojekyll"
          cp CNAME ../CNAME.backup 2>/dev/null || echo "未找到 CNAME"
          
          # 清空目标分支内容（保留 .git）
          git rm -rf .
          
          # 恢复备份的关键文件
          cp ../.nojekyll.backup .nojekyll 2>/dev/null || echo "创建新的 .nojekyll"
          touch .nojekyll  # 确保 .nojekyll 存在
          cp ../CNAME.backup CNAME 2>/dev/null || echo "未恢复 CNAME 文件"
          
          # 返回工作区根目录
          cd ..
          
          # 仅将构建产物（dist 目录）复制到目标仓库
          # 注意：dist/ 结尾的斜杠表示复制目录内容到目标根目录，而不是创建 dist 子目录
          rsync -av --exclude='.git' --exclude='temp_target' dist/ temp_target/
          
          # 进入目标仓库并提交推送
          cd temp_target
          git add .
          git commit -m "从 ${{ github.repository }} 部署，提交 ${{ github.sha }}" || echo "没有变更需要提交"
          git push origin gh-pages
          
      - name: 等待 GitHub Pages 构建
        run: |
          echo "等待 GitHub Pages 构建..."
          sleep 10
          
      - name: 验证 GitHub Pages 部署
        run: |
          PAGES_URL="https://luo202044.github.io/ClassIn"
          echo "检查 GitHub Pages 是否可用：$PAGES_URL"
          curl -f --retry 5 --retry-delay 10 "$PAGES_URL" || echo "GitHub Pages 可能仍在构建中，请手动检查"
